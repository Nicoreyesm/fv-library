<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Practice Library — FullView Performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f5a623;--gold-glow:rgba(245,166,35,.18);
  --bg:#0a0a0c;--surface:#16161c;--card:#1c1c24;
  --border:#26262f;--border2:#32323e;
  --text:#e8e8f0;--muted:#5a5a70;--muted2:#3e3e50;
  --radius:8px;--pos-color:var(--gold);
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 0% 0%,rgba(80,40,140,.25) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 100% 100%,rgba(30,30,80,.2) 0%,transparent 50%)}
.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* HEADER */
.header{display:flex;align-items:center;gap:16px;padding:16px 32px;border-bottom:1px solid var(--border);background:rgba(10,10,12,.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.fv-logo{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer}
.fv-wordmark{display:flex;flex-direction:column;line-height:1}
.fv-name{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:#fff;letter-spacing:-.01em}
.fv-sub{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;margin-top:1px}
.hdiv{width:1px;height:28px;background:var(--border2);margin:0 4px}
.hsub{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.hright{margin-left:auto;display:flex;align-items:center;gap:10px}
.ts-badge{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:10px;color:var(--muted)}
.live-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;animation:blink 2s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.icon-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:5px 11px;font-size:11px;cursor:pointer;font-family:'Barlow',sans-serif;transition:all .2s;display:flex;align-items:center;gap:5px}
.icon-btn:hover{border-color:var(--gold);color:var(--gold)}
.auth-btn{border-radius:6px;padding:6px 14px;font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;border:none}
.auth-btn.disconnected{background:var(--gold);color:#000}
.auth-btn.disconnected:hover{background:#e09520}
.auth-btn.connected{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.auth-btn.connected:hover{background:rgba(239,68,68,.12);color:#ef4444;border-color:rgba(239,68,68,.3)}

/* ACTION BAR */
.action-bar{display:flex;align-items:center;gap:12px;padding:14px 32px 0;flex-wrap:wrap}
.action-toggle{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.abtn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:8px 22px;border:none;cursor:pointer;background:transparent;color:var(--muted);transition:all .2s}
.abtn.on{background:var(--gold-glow);color:var(--gold)}
.search-wrap{flex:1;max-width:320px;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.gsearch{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:7px 12px 7px 32px;outline:none;transition:border-color .2s}
.gsearch:focus{border-color:var(--gold)}
.gsearch::placeholder{color:var(--muted)}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-left:auto}
.vbtn{background:none;border:none;padding:7px 10px;cursor:pointer;color:var(--muted);transition:all .2s;display:flex;align-items:center}
.vbtn.on{background:var(--gold-glow);color:var(--gold)}

/* TABS */
.twrap{padding:12px 32px 0;overflow-x:auto;scrollbar-width:none}
.twrap::-webkit-scrollbar{display:none}
.tabs{display:flex;gap:3px;white-space:nowrap}
.tab{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:8px 16px 10px;border-radius:7px 7px 0 0;border:1px solid transparent;border-bottom:none;cursor:pointer;color:var(--muted);background:transparent;transition:all .2s;position:relative}
.tab::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:transparent;transition:background .2s}
.tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tab.active{color:var(--text);background:var(--surface);border-color:var(--border)}
.tab.active::after{background:var(--pos-color)}
.cnt{display:inline-block;margin-left:5px;font-size:9px;padding:1px 6px;border-radius:8px;background:var(--border);color:var(--muted);font-family:'Barlow',sans-serif;font-weight:600;vertical-align:middle}
.tab.active .cnt{background:var(--pos-color);color:#000}

/* PANEL */
.panel{background:var(--surface);border:1px solid var(--border);border-top:none;margin:0 32px 32px;border-radius:0 0 12px 12px;flex:1;display:flex;flex-direction:column}
.poshead{display:flex;align-items:center;gap:16px;padding:20px 28px 16px;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.poshead::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--pos-color-alpha,transparent) 0%,transparent 60%);pointer-events:none}
.pos-icon-wrap{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:var(--pos-bg,rgba(245,166,35,.1));border:1px solid var(--pos-border,rgba(245,166,35,.2));position:relative;z-index:1}
.pos-info{position:relative;z-index:1}
.pos-name{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;letter-spacing:.01em;color:var(--pos-color)}
.pos-desc{font-size:11px;color:var(--muted);margin-top:2px}
.pos-right{margin-left:auto;display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.action-pill{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:5px;border:1px solid}
.action-pill.off{color:#10b981;border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.08)}
.action-pill.def{color:#ef4444;border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.08)}
.progress-wrap{text-align:right}
.progress-label{font-size:10px;color:var(--muted);margin-bottom:4px}
.progress-bar{width:120px;height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--pos-color);border-radius:2px;transition:width .4s ease}
.carea{flex:1;overflow-y:auto;padding:22px 28px 28px}

/* DASHBOARD */
.dash-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;letter-spacing:.02em;color:#fff;margin-bottom:4px}
.dash-title span{color:var(--gold)}
.dash-sub{font-size:12px;color:var(--muted);margin-bottom:24px}
.pos-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.pos-card{border-radius:10px;border:1px solid var(--border);background:var(--card);padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.pos-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--c-alpha) 0%,transparent 60%);pointer-events:none}
.pos-card:hover{transform:translateY(-2px);border-color:var(--c);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.pos-card-icon{font-size:24px;margin-bottom:10px}
.pos-card-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--c);margin-bottom:8px}
.pos-card-bar{height:2px;background:var(--border2);border-radius:2px;overflow:hidden;margin-bottom:6px}
.pos-card-fill{height:100%;border-radius:2px;transition:width .6s ease}
.pos-card-stats{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
.pos-card-count{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#fff;line-height:1}
.pos-card-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

/* CATEGORIES */
.catsec{margin-bottom:20px}
.cathead{display:flex;align-items:center;gap:10px;margin-bottom:12px;cursor:pointer;user-select:none;padding:10px 14px;border-radius:7px;border:1px solid var(--border);background:var(--card);transition:border-color .2s}
.cathead:hover{border-color:var(--pos-color)}
.catdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cattitle{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.catcount{font-size:10px;color:var(--muted);margin-left:2px}
.cat-spacer{flex:1}
.catchev{font-size:9px;color:var(--muted);transition:transform .2s}
.catsec.collapsed .catchev{transform:rotate(-90deg)}
.catsec.collapsed .vgrid,.catsec.collapsed .vlist{display:none}

/* SUBCATEGORY */
.subcatsec{margin-bottom:14px;padding-left:12px;border-left:2px solid var(--border)}
.subcattitle{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding:4px 0}

/* VIDEO GRID */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.vlist{display:flex;flex-direction:column;gap:6px}
.vrow{display:flex;align-items:center;gap:14px;padding:10px 14px;border-radius:7px;border:1px solid var(--border);background:var(--card);text-decoration:none;transition:all .18s}
.vrow:hover{border-color:var(--pos-color);background:rgba(255,255,255,.02)}
.vrow-thumb{width:56px;height:32px;border-radius:5px;background:#0a0a12;overflow:hidden;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center}
.vrow-thumb img{width:100%;height:100%;object-fit:cover}
.vrow-thumb-fallback{font-size:16px;opacity:.3;position:absolute}
.vrow-mini-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);opacity:0;transition:opacity .15s}
.vrow:hover .vrow-mini-play{opacity:1}
.vrow-tri{width:0;height:0;border:4px solid transparent;border-left:7px solid #fff;margin-left:2px}
.vrow-info{flex:1;min-width:0}
.vrow-title{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vrow-cat{font-size:10px;color:var(--muted);margin-top:2px}
.vrow-badge{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:4px;flex-shrink:0}
.vrow-seen{font-size:14px;flex-shrink:0;opacity:.4;cursor:pointer;transition:opacity .2s;background:none;border:none;color:inherit}
.vrow-seen:hover,.vrow-seen.on{opacity:1}

/* VIDEO CARD */
.vcard{background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:hidden;transition:transform .18s,border-color .18s,box-shadow .18s;cursor:pointer;text-decoration:none;display:block;position:relative}
.vcard:hover{transform:translateY(-2px);border-color:var(--pos-color);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.vthumb{position:relative;aspect-ratio:16/9;background:#08080f;overflow:hidden;display:flex;align-items:center;justify-content:center}
.vthumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.vcard:hover .vthumb img{transform:scale(1.04)}
.vthumb-fallback{font-size:40px;opacity:.07;position:absolute}
.vplay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);opacity:0;transition:opacity .2s}
.vcard:hover .vplay{opacity:1}
.vplay-ring{width:42px;height:42px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;transform:scale(.9);transition:transform .2s}
.vcard:hover .vplay-ring{transform:scale(1)}
.vtri{width:0;height:0;border:7px solid transparent;border-left:12px solid #000;margin-left:3px}
.vbadge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.8);border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.04em;padding:2px 7px;text-transform:uppercase;color:var(--pos-color)}
.vatag{position:absolute;top:8px;right:8px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.04em;padding:2px 6px;text-transform:uppercase}
.vatag.off{background:rgba(16,185,129,.2);color:#10b981;border:1px solid rgba(16,185,129,.3)}
.vatag.def{background:rgba(239,68,68,.2);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.vseen-btn{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.7);border:none;border-radius:4px;padding:3px 7px;cursor:pointer;font-size:12px;opacity:0;transition:opacity .2s;color:#fff}
.vcard:hover .vseen-btn,.vcard.seen .vseen-btn{opacity:1}
.vcard.seen .vthumb::after{content:'';position:absolute;inset:0;background:rgba(16,185,129,.07);pointer-events:none}
.vcard.seen .vbadge{background:rgba(16,185,129,.22);color:#10b981}
.vbody{padding:10px 12px 12px}
.vtitle{font-size:12px;font-weight:500;line-height:1.4;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:7px}
.vtags{display:flex;gap:5px;flex-wrap:wrap}
.vtag-pos{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:4px}

/* STATES */
.estate{display:flex;flex-direction:column;align-items:center;padding:48px 20px;text-align:center;color:var(--muted);gap:12px}
.eicon{font-size:36px;opacity:.25}
.etitle{font-size:15px;font-weight:600;color:var(--text);font-family:'Barlow Condensed',sans-serif;letter-spacing:.03em}
.emsg{font-size:12px;max-width:320px;line-height:1.6}
.elink{margin-top:6px;font-size:11px;color:var(--gold);text-decoration:none;border:1px solid rgba(245,166,35,.3);border-radius:6px;padding:5px 14px;transition:background .2s;display:inline-flex;align-items:center;gap:5px}
.elink:hover{background:rgba(245,166,35,.08)}

.loading-state{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:16px;color:var(--muted)}
.spinner{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--pos-color);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;font-weight:500;color:var(--text)}
.loading-sub{font-size:11px;opacity:.6}
.loading-bar-wrap{width:240px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.loading-bar{height:100%;background:var(--pos-color);border-radius:2px;transition:width .3s ease}

/* AUTH SCREEN */
.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 28px;text-align:center;gap:20px;flex:1}
.auth-icon{font-size:52px;margin-bottom:4px}
.auth-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:#fff;letter-spacing:.02em}
.auth-desc{font-size:13px;color:var(--muted);max-width:340px;line-height:1.7}
.auth-connect-btn{background:var(--gold);color:#000;border:none;border-radius:8px;padding:13px 30px;font-size:13px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.auth-connect-btn:hover{background:#e09520;transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,166,35,.3)}
.auth-note{font-size:10px;color:var(--muted2);max-width:280px;line-height:1.6}

/* CHIPS */
.cats-section{margin-top:20px}
.cats-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.cats-grid{display:flex;flex-wrap:wrap;gap:6px}
.cat-chip{display:inline-flex;align-items:center;gap:5px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:5px 11px;border-radius:6px;background:var(--card);border:1px solid var(--border);color:var(--muted);text-decoration:none;transition:all .18s}
.cat-chip:hover{border-color:var(--gold);color:var(--gold);background:rgba(245,166,35,.06);transform:translateY(-1px)}
.cat-chip.no-link{opacity:.4;cursor:default;pointer-events:none}

/* LIB */
.libblock{margin-bottom:28px}
.libposhead{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.libposdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.libpostitle{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:.05em;text-transform:uppercase}
.libposcount{margin-left:auto;font-size:10px;color:var(--muted)}

.footer{text-align:center;font-size:10px;color:var(--muted2);padding-bottom:18px;letter-spacing:.03em}

@media(max-width:700px){
  .header{padding:12px 16px;flex-wrap:wrap}
  .action-bar{padding:12px 16px 0;flex-wrap:wrap}
  .twrap{padding:10px 16px 0}
  .panel{margin:0 16px 20px}
  .carea,.poshead{padding-left:16px;padding-right:16px}
  .vgrid{grid-template-columns:1fr}
  .search-wrap{max-width:100%;width:100%}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">

<header class="header">
  <div class="fv-logo" onclick="goHome()">
    <svg width="30" height="34" viewBox="0 0 32 36" fill="none">
      <path d="M20 2L4 20H16L12 34L28 16H16L20 2Z" fill="white"/>
      <path d="M20 2L4 20H16L12 34L28 16H16L20 2Z" fill="url(#bg)" opacity=".55"/>
      <defs><linearGradient id="bg" x1="4" y1="2" x2="28" y2="34" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#f5a623"/><stop offset="100%" stop-color="white" stop-opacity="0"/></linearGradient></defs>
    </svg>
    <div class="fv-wordmark">
      <span class="fv-name">FullView</span>
      <span class="fv-sub">Best Practice</span>
    </div>
  </div>
  <div class="hdiv"></div>
  <span class="hsub" id="hdr-section">Best Practice</span>
  <div class="hright">
    <div class="ts-badge" id="ts-badge" style="display:none"><span class="live-dot"></span><span id="ts">—</span></div>
    <button class="icon-btn" id="refresh-btn" onclick="loadFromDrive(true)" style="display:none">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Actualizar
    </button>
    <button class="auth-btn disconnected" id="auth-btn" onclick="handleAuth()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Conectar con Google
    </button>
  </div>
</header>

<div class="action-bar" id="action-bar" style="display:none">
  <div class="action-toggle">
    <button class="abtn on" id="bon" onclick="setAction('off')">⚡ Offensive</button>
    <button class="abtn" id="bde" onclick="setAction('def')">🛡️ Defensive</button>
  </div>
  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="gsearch" id="fsearch" type="text" placeholder="Buscar video o categoría…" oninput="doFilter(this.value)">
  </div>

// ── SEEN ──────────────────────────────────────────────────────────────────────
const SEEN_KEY='fvp_seen_v1';
function loadSeen(){try{return new Set(JSON.parse(localStorage.getItem(SEEN_KEY)||'[]'))}catch{return new Set()}}
function saveSeen(s){try{localStorage.setItem(SEEN_KEY,JSON.stringify([...s]))}catch{}}
const seen=loadSeen();
function toggleSeen(id,e){
  e.preventDefault();e.stopPropagation();
  seen.has(id)?seen.delete(id):seen.add(id);saveSeen(seen);
  document.querySelectorAll(`[data-vid="${id}"]`).forEach(el=>{
    el.classList.toggle('seen',seen.has(id));
    const btn=el.querySelector('.vseen-btn,.vrow-seen');
    if(btn)btn.textContent=seen.has(id)?'✓':'○';
  });
}

const extLink=`<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

function setAccent(c){
  document.documentElement.style.setProperty('--pos-color',c);
  document.documentElement.style.setProperty('--pos-bg',`color-mix(in srgb,${c} 10%,transparent)`);
  document.documentElement.style.setProperty('--pos-border',`color-mix(in srgb,${c} 25%,transparent)`);
  document.documentElement.style.setProperty('--pos-color-alpha',`color-mix(in srgb,${c} 7%,transparent)`);
}
function tsStr(){const n=new Date();return n.toLocaleDateString('es-CL',{day:'2-digit',month:'short'})+' · '+n.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})}
function extractMD(n){const m=(n||'').match(/MD\s*(\d+)/i);return m?`MD${m[1]}`:''}
function totalVids(posKey,action){
  if(posKey==='lib')return POSITIONS.filter(p=>p.key!=='lib').reduce((s,p)=>s+totalVids(p.key,action),0);
  return Object.values(DATA[posKey]?.[action]||{}).reduce((s,v)=>s+v.length,0);
}
function catsWithContent(posKey,action){return Object.values(DATA[posKey]?.[action]||{}).filter(v=>v.length>0).length}
function totalCats(action){return action==='off'?OFF_CATS.length:DEF_CATS.length}
function goHome(){switchPos('lib',C.lib)}

// ══════════════════════════════════════════════════════════════════════════════
// GOOGLE AUTH
// ══════════════════════════════════════════════════════════════════════════════
function handleAuth(){
  if(accessToken&&Date.now()<tokenExpiry){
    if(confirm('¿Desconectar tu cuenta de Google?')){
      accessToken=null;tokenExpiry=0;
      try{localStorage.removeItem(TOKEN_KEY)}catch{}
      updateAuthBtn();showAuthScreen();
    }
    return;
  }
  startOAuth();
}

function startOAuth(){
  const params=new URLSearchParams({
    client_id:CLIENT_ID,
    redirect_uri:`https://nicoreyesm.github.io/fv-library/best_practice_library.html`,
    response_type:'token',
    scope:SCOPES,
    prompt:'select_account'
  });
  window.location.href=`https://accounts.google.com/o/oauth2/v2/auth?${params}`;
}

function parseTokenFromHash(){
  const params=new URLSearchParams(window.location.hash.substring(1));
  const token=params.get('access_token');
  const expiresIn=parseInt(params.get('expires_in')||'3600');
  if(token){
    accessToken=token;
    tokenExpiry=Date.now()+(expiresIn-60)*1000;
    try{localStorage.setItem(TOKEN_KEY,JSON.stringify({token,expiry:tokenExpiry}))}catch{}
    history.replaceState(null,'',window.location.pathname+window.location.search);
    return true;
  }
  return false;
}

function loadStoredToken(){
  try{
    const s=JSON.parse(localStorage.getItem(TOKEN_KEY)||'null');
    if(s&&s.expiry>Date.now()+60000){accessToken=s.token;tokenExpiry=s.expiry;return true}
  }catch{}
  return false;
}

function updateAuthBtn(){
  const btn=$('auth-btn');
  const connected=accessToken&&Date.now()<tokenExpiry;
  btn.className=`auth-btn ${connected?'connected':'disconnected'}`;
  btn.innerHTML=connected
    ?`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Conectado`
    :`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Conectar con Google`;
  $('refresh-btn').style.display=connected?'flex':'none';
  $('ts-badge').style.display=connected?'flex':'none';
}

// ══════════════════════════════════════════════════════════════════════════════
// DRIVE API — lista recursiva (nivel cat → subcats → videos)
// ══════════════════════════════════════════════════════════════════════════════
async function driveGet(url){
  const res=await fetch(url,{headers:{Authorization:`Bearer ${accessToken}`}});
  if(res.status===401){accessToken=null;tokenExpiry=0;try{localStorage.removeItem(TOKEN_KEY)}catch{}updateAuthBtn();throw new Error('token_expired')}
  return res.json();
}

async function listChildren(folderId,videosOnly=false){
  const q=videosOnly
    ?`'${folderId}' in parents and mimeType contains 'video/'`
    :`'${folderId}' in parents`;
  const url=`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name,mimeType)&pageSize=200&orderBy=name`;
  const data=await driveGet(url);
  return data.files||[];
}

// Recursively get all video files under a folder, grouping by immediate subfolder name
async function getVideosUnderFolder(folderId){
  // First check for direct videos
  const direct=await listChildren(folderId,true);
  const result=[]; // [{id, name, subcat}]
  direct.forEach(f=>result.push({id:f.id,name:f.name.replace(/\.[^.]+$/,''),subcat:null}));

  // Then check subfolders
  const allItems=await listChildren(folderId,false);
  const subfolders=allItems.filter(f=>f.mimeType==='application/vnd.google-apps.folder');

  await Promise.all(subfolders.map(async sf=>{
    const vids=await listChildren(sf.id,true);
    vids.forEach(f=>result.push({id:f.id,name:f.name.replace(/\.[^.]+$/,''),subcat:sf.name}));
  }));

  return result;
}

// ── LOAD FROM DRIVE ───────────────────────────────────────────────────────────
async function loadFromDrive(forceRefresh=false){
  if(!accessToken||Date.now()>=tokenExpiry){showAuthScreen();return}

  // Try cache
  if(!forceRefresh){
    try{
      const cached=JSON.parse(localStorage.getItem(CACHE_KEY)||'null');
      if(cached&&cached.ts&&(Date.now()-cached.ts)<CACHE_TTL){
        applyData(cached.data);
        $('ts').textContent='Cache · '+new Date(cached.ts).toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
        showUI();return;
      }
    }catch{}
  }

  // Build list of all category folders to fetch
  const tasks=[];
  POSITIONS.filter(p=>p.key!=='lib').forEach(pos=>{
    ['off','def'].forEach(action=>{
      const cats=action==='off'?OFF_CATS:DEF_CATS;
      cats.forEach(cat=>{
        const fid=(CAT_FOLDERS[pos.key]?.[action]||{})[cat];
        if(fid) tasks.push({posKey:pos.key,action,cat,fid});
      });
    });
  });

  // Initialize snapshot
  const snapshot={};
  POSITIONS.filter(p=>p.key!=='lib').forEach(p=>{
    snapshot[p.key]={off:{},def:{}};
    OFF_CATS.forEach(c=>{snapshot[p.key].off[c]=[]});
    DEF_CATS.forEach(c=>{snapshot[p.key].def[c]=[]});
  });

  // Show loading
  $('carea').innerHTML=`<div class="loading-state">
    <div class="spinner"></div>
    <div class="loading-text">Cargando desde Drive…</div>
    <div class="loading-bar-wrap"><div class="loading-bar" id="lbar" style="width:0%"></div></div>
    <div class="loading-sub" id="lsub">0 / ${tasks.length} carpetas</div>
  </div>`;
  $('poshead').style.display='none';
  $('action-bar').style.display='none';
  $('tabs-wrap').style.display='none';

  // Fetch in batches of 8
  const BATCH=8;
  let done=0;
  for(let i=0;i<tasks.length;i+=BATCH){
    const batch=tasks.slice(i,i+BATCH);
    await Promise.all(batch.map(async({posKey,action,cat,fid})=>{
      try{
        const vids=await getVideosUnderFolder(fid);
        snapshot[posKey][action][cat]=vids;
      }catch(e){
        if(e.message==='token_expired'){throw e}
        snapshot[posKey][action][cat]=[];
      }
      done++;
      const pct=Math.round(done/tasks.length*100);
      const lb=document.getElementById('lbar');
      const ls=document.getElementById('lsub');
      if(lb)lb.style.width=pct+'%';
      if(ls)ls.textContent=`${done} / ${tasks.length} carpetas`;
    }));
  }

  // Cache and apply
  try{localStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),data:snapshot}))}catch{}
  applyData(snapshot);
  $('ts').textContent=tsStr();
  showUI();
}

function applyData(snapshot){
  POSITIONS.filter(p=>p.key!=='lib').forEach(p=>{
    if(snapshot[p.key]){DATA[p.key]=snapshot[p.key]}
  });
}

function showAuthScreen(){
  $('poshead').style.display='none';
  $('action-bar').style.display='none';
  $('tabs-wrap').style.display='none';
  $('carea').innerHTML=`<div class="auth-screen">
    <div class="auth-icon">⚡</div>
    <div class="auth-title">Best Practice Library</div>
    <div class="auth-desc">Conecta tu cuenta de Google para cargar los videos automáticamente desde Drive. Solo necesita permiso de lectura.</div>
    <button class="auth-connect-btn" onclick="handleAuth()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Conectar con Google
    </button>
    <div class="auth-note">Solo acceso de lectura · no modifica ni elimina archivos · sesión guardada 1 hora</div>
  </div>`;
}

function showUI(){
  $('action-bar').style.display='flex';
  $('tabs-wrap').style.display='block';
  $('poshead').style.display='flex';
  updateAuthBtn();
  renderTabs();
  const pos=POSITIONS.find(p=>p.key===activePos);
  renderHeader(pos);
  if(activePos==='lib')renderLib();else renderPos(pos);
  scheduleRefresh();
}

// ══════════════════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════════════════
function buildCard(v,pos){
  const md=extractMD(v.name);
  const s=seen.has(v.id);
  const isOff=activeAction==='off';
  return `<a class="vcard${s?' seen':''}" href="${driveUrl(v.id)}" target="_blank" rel="noopener" data-vid="${v.id}">
    <div class="vthumb">
      <img src="${thumbUrl(v.id)}" alt="" loading="lazy" onerror="this.style.display='none'">
      <div class="vthumb-fallback">${pos.icon}</div>
      <div class="vplay"><div class="vplay-ring"><div class="vtri"></div></div></div>
      ${md?`<div class="vbadge">${md}</div>`:''}
      <div class="vatag ${isOff?'off':'def'}">${isOff?'OFF':'DEF'}</div>
      <button class="vseen-btn" onclick="toggleSeen('${v.id}',event)">${s?'✓':'○'}</button>
    </div>
    <div class="vbody">
      <div class="vtitle">${v.name}</div>
      <div class="vtags"><span class="vtag-pos" style="color:${pos.color};background:color-mix(in srgb,${pos.color} 12%,transparent);border:1px solid color-mix(in srgb,${pos.color} 25%,transparent)">${pos.short}</span>${v.subcat?`<span class="vtag-pos" style="background:var(--border);color:var(--muted);border:none">${v.subcat}</span>`:''}</div>
    </div>
  </a>`;
}

function buildRow(v,pos,catName){
  const s=seen.has(v.id);
  const isOff=activeAction==='off';
  return `<a class="vrow" href="${driveUrl(v.id)}" target="_blank" rel="noopener" data-vid="${v.id}">
    <div class="vrow-thumb">
      <img src="${thumbUrl(v.id)}" alt="" loading="lazy" onerror="this.style.display='none'">
      <div class="vrow-thumb-fallback">${pos.icon}</div>
      <div class="vrow-mini-play"><div class="vrow-tri"></div></div>
    </div>
    <div class="vrow-info">
      <div class="vrow-title">${v.name}</div>
      <div class="vrow-cat">${catName}${v.subcat?' · '+v.subcat:''}</div>
    </div>
    <span class="vrow-badge ${isOff?'off':'def'}" style="background:${isOff?'rgba(16,185,129,.15)':'rgba(239,68,68,.15)'};color:${isOff?'#10b981':'#ef4444'}">${isOff?'OFF':'DEF'}</span>
    <button class="vrow-seen${s?' on':''}" onclick="toggleSeen('${v.id}',event)">${s?'✓':'○'}</button>
  </a>`;
}

function renderVideos(vids,pos,catName=''){
  if(!vids.length)return '';
  // Group by subcat if present
  const hasSubcats=vids.some(v=>v.subcat);
  if(hasSubcats&&viewMode==='grid'){
    const groups={};
    vids.forEach(v=>{const k=v.subcat||'—';if(!groups[k])groups[k]=[];groups[k].push(v)});
    return Object.entries(groups).map(([sub,vs])=>`
      <div class="subcatsec">
        <div class="subcattitle">${sub}</div>
        <div class="vgrid">${vs.map(v=>buildCard(v,pos)).join('')}</div>
      </div>`).join('');
  }
  return viewMode==='grid'
    ?`<div class="vgrid">${vids.map(v=>buildCard(v,pos)).join('')}</div>`
    :`<div class="vlist">${vids.map(v=>buildRow(v,pos,catName)).join('')}</div>`;
}

function chip(catName,posKey,action){
  const fid=(CAT_FOLDERS[posKey]?.[action]||{})[catName];
  return fid
    ?`<a class="cat-chip" href="${driveFolderUrl(fid)}" target="_blank" rel="noopener">${catName}${extLink}</a>`
    :`<span class="cat-chip no-link">${catName}</span>`;
}

function renderHeader(pos){
  setAccent(pos.color);
  $('picon').textContent=pos.icon;
  $('pname').textContent=pos.label;$('pname').style.color=pos.color;
  $('pdesc').textContent=pos.key==='lib'?'Todos los videos de todas las posiciones':`Acciones ${activeAction==='off'?'ofensivas':'defensivas'}`;
  $('hdr-section').textContent=pos.key==='lib'?'Best Practice':pos.label;
  const isOff=activeAction==='off';
  $('apill').textContent=isOff?'Offensive':'Defensive';
  $('apill').className=`action-pill ${isOff?'off':'def'}`;
  const pw=$('progress-wrap');
  if(pos.key!=='lib'){
    pw.style.display='block';
    const cats=catsWithContent(pos.key,activeAction);
    const total=totalCats(activeAction);
    $('progress-label').textContent=`${cats} / ${total} categorías`;
    $('progress-fill').style.width=(total?Math.round(cats/total*100):0)+'%';
  } else {pw.style.display='none'}
}

function renderTabs(){
  $('tabs').innerHTML=POSITIONS.map(pos=>{
    const n=totalVids(pos.key,activeAction);
    const active=pos.key===activePos;
    return `<div class="tab${active?' active':''}" style="${active?`--pos-color:${pos.color}`:''}" onclick="switchPos('${pos.key}','${pos.color}')">${pos.short}<span class="cnt">${n||'—'}</span></div>`;
  }).join('');
}

function renderDashboard(){
  const positions=POSITIONS.filter(p=>p.key!=='lib');
  const totalAll=totalVids('lib',activeAction);
  const catTotal=totalCats(activeAction);
  const isOff=activeAction==='off';
  $('carea').innerHTML=`
    <div class="dash-title">${isOff?'⚡ <span>Offensive</span>':'🛡️ <span>Defensive</span>'} Actions</div>
    <div class="dash-sub">${totalAll} videos · ${positions.length} posiciones · actualizado desde Drive</div>
    <div class="pos-cards-grid">${positions.map(p=>{
      const n=totalVids(p.key,activeAction);
      const cats=catsWithContent(p.key,activeAction);
      const pct=catTotal?Math.round(cats/catTotal*100):0;
      return `<div class="pos-card" onclick="switchPos('${p.key}','${p.color}')" style="--c:${p.color};--c-alpha:color-mix(in srgb,${p.color} 8%,transparent)">
        <div class="pos-card-icon">${p.icon}</div>
        <div class="pos-card-name">${p.label}</div>
        <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px">
          <div><div class="pos-card-count" style="color:${p.color}">${n}</div><div class="pos-card-label">videos</div></div>
          <div style="text-align:right"><div class="pos-card-count" style="color:${p.color};font-size:15px">${cats}/${catTotal}</div><div class="pos-card-label">categorías</div></div>
        </div>
        <div class="pos-card-bar"><div class="pos-card-fill" style="width:${pct}%;background:${p.color}"></div></div>
        <div class="pos-card-stats" style="margin-top:5px"><span>${pct}% completo</span><span style="color:${p.color}">Ver →</span></div>
      </div>`;
    }).join('')}</div>`;
}

function renderPos(pos){
  const cats=DATA[pos.key]?.[activeAction]||{};
  const catList=activeAction==='off'?OFF_CATS:DEF_CATS;
  const q=filterText.toLowerCase();
  const total=catList.reduce((s,c)=>(cats[c]||[]).length+s,0);

  if(total===0){
    const fid=activeAction==='off'?pos.off:pos.def;
    $('carea').innerHTML=`<div class="estate">
      <div class="eicon">${pos.icon}</div>
      <div class="etitle">Sin videos aún</div>
      <div class="emsg">Sube videos a las carpetas en Drive y haz clic en Actualizar.</div>
      ${fid?`<a class="elink" href="${driveFolderUrl(fid)}" target="_blank" rel="noopener">Abrir carpeta en Drive ${extLink}</a>`:''}
    </div>
    <div class="cats-section">
      <div class="cats-label">Categorías (${catList.length}) — clic para abrir en Drive</div>
      <div class="cats-grid">${catList.map(c=>chip(c,pos.key,activeAction)).join('')}</div>
    </div>`;
    return;
  }

  const filtered=catList.map(c=>({c,vids:(cats[c]||[]).filter(v=>!q||v.name.toLowerCase().includes(q)||c.toLowerCase().includes(q)||(v.subcat&&v.subcat.toLowerCase().includes(q)))})).filter(x=>x.vids.length>0);
  if(!filtered.length){$('carea').innerHTML=`<div class="estate"><div class="eicon">🔍</div><div class="etitle">Sin resultados</div><div class="emsg">Intenta con otro término.</div></div>`;return}

  $('carea').innerHTML=filtered.map((x,i)=>`
    <div class="catsec" id="cs${i}">
      <div class="cathead" onclick="toggleCat(${i})">
        <div class="catdot" style="background:${pos.color};box-shadow:0 0 6px ${pos.color}66"></div>
        <div class="cattitle">${x.c}</div>
        <span class="catcount">${x.vids.length} video${x.vids.length!==1?'s':''}</span>
        <div class="cat-spacer"></div>
        <div class="catchev">▼</div>
      </div>
      ${renderVideos(x.vids,pos,x.c)}
    </div>`).join('');
}

function renderLib(){
  const q=filterText.toLowerCase();
  const totalAll=totalVids('lib',activeAction);
  if(totalAll===0){renderDashboard();return}
  let html='';
  for(const pos of POSITIONS.filter(p=>p.key!=='lib')){
    const allVids=Object.values(DATA[pos.key]?.[activeAction]||{}).flat();
    const filtered=q?allVids.filter(v=>v.name.toLowerCase().includes(q)):allVids;
    if(!filtered.length)continue;
    html+=`<div class="libblock">
      <div class="libposhead"><div class="libposdot" style="background:${pos.color};box-shadow:0 0 6px ${pos.color}77"></div><div class="libpostitle" style="color:${pos.color}">${pos.label}</div><div class="libposcount">${filtered.length} videos</div></div>
      ${renderVideos(filtered,pos)}
    </div>`;
  }
  if(!html)html=`<div class="estate"><div class="eicon">🔍</div><div class="etitle">Sin resultados</div></div>`;
  $('carea').innerHTML=html;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function toggleCat(i){document.getElementById('cs'+i).classList.toggle('collapsed')}
function doFilter(v){filterText=v;const pos=POSITIONS.find(p=>p.key===activePos);if(activePos==='lib')renderLib();else renderPos(pos)}
function setView(m){viewMode=m;$('vgrid-btn').classList.toggle('on',m==='grid');$('vlist-btn').classList.toggle('on',m==='list');const pos=POSITIONS.find(p=>p.key===activePos);if(activePos==='lib')renderLib();else renderPos(pos)}
function switchPos(key,color){
  activePos=key;filterText='';$('fsearch').value='';
  setAccent(color);renderTabs();
  const pos=POSITIONS.find(p=>p.key===key);
  renderHeader(pos);
  if(key==='lib')renderLib();else renderPos(pos);
}
function setAction(a){
  if(a===activeAction)return;activeAction=a;
  $('bon').classList.toggle('on',a==='off');$('bde').classList.toggle('on',a==='def');
  const pos=POSITIONS.find(p=>p.key===activePos);switchPos(activePos,pos.color);
}

function scheduleRefresh(){
  const now=new Date(),next=new Date();next.setHours(19,0,0,0);if(now>=next)next.setDate(next.getDate()+1);
  const ms=next-now,hh=Math.floor(ms/3600000),mm=Math.floor((ms%3600000)/60000);
  $('foot').textContent=`Actualización automática desde Drive a las 19:00 · en ${hh}h ${mm}m`;
  setTimeout(()=>{loadFromDrive(true)},ms);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(function(){
  if(parseTokenFromHash()){updateAuthBtn();loadFromDrive();return}
  if(loadStoredToken()){updateAuthBtn();loadFromDrive();return}
  updateAuthBtn();showAuthScreen();
})();
